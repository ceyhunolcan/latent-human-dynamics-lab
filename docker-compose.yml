version: "3.9"

services:
  api:
    build: .
    image: latent-human-dynamics-lab:latest
    container_name: lhdl-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app

  dashboard:
    image: latent-human-dynamics-lab:latest
    container_name: lhdl-dashboard
    command: streamlit run src/dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - api
