name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx tabulate

      - name: Health check
        run: |
          PYTHONPATH=src python -m utils.health_check

      - name: Smoke test
        run: python scripts/smoke_test.py

      - name: Run test suite
        run: pytest tests/ -v

      - name: End-to-end pipeline (small cohort)
        run: |
          python scripts/run_pipeline.py --participants 20 --days 45
          python scripts/train_dynamics_model.py
          python scripts/generate_figures.py

      - name: Verify figures generated
        run: |
          ls -la results/figures/
          test $(ls results/figures/*.png | wc -l) -ge 5
